name: Build release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Release preflight tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
        shell: bash

      - name: Compile Python sources
        run: python -m compileall start.py install.py tools tests
        shell: bash

      - name: Run Ruff
        run: python -m ruff check start.py install.py tools tests
        shell: bash

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
        shell: bash

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            executable: auto-bluray-tui.exe
            data-separator: ";"
            archive: auto-bluray-tui-windows.zip
          - name: macos-silicon
            os: macos-latest
            executable: auto-bluray-tui
            data-separator: ":"
            archive: auto-bluray-tui-macos-silicon.zip
            macos-arch: arm64
          - name: macos-intel
            os: macos-15-intel
            executable: auto-bluray-tui
            data-separator: ":"
            archive: auto-bluray-tui-macos-intel.zip
            macos-arch: x86_64
          - name: linux
            os: ubuntu-latest
            executable: auto-bluray-tui
            data-separator: ":"
            archive: auto-bluray-tui-linux.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
        shell: bash

      - name: Build standalone executable with PyInstaller
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --onedir \
            --name auto-bluray-tui \
            --paths tools \
            --hidden-import bluray_tui_monitor \
            --hidden-import requests \
            --collect-all requests \
            --collect-all urllib3 \
            --collect-all certifi \
            --collect-all charset_normalizer \
            --collect-all idna \
            --add-data "lib${{ matrix.data-separator }}lib" \
            --add-data "tools${{ matrix.data-separator }}tools" \
            --add-data "scripts${{ matrix.data-separator }}scripts" \
            --add-data "xlets${{ matrix.data-separator }}xlets" \
            --add-data "bin${{ matrix.data-separator }}bin" \
            --add-data "DiscCreationTools${{ matrix.data-separator }}DiscCreationTools" \
            --add-data "docs${{ matrix.data-separator }}docs" \
            --add-data "README.md${{ matrix.data-separator }}." \
            --add-data "README_RELEASE.md${{ matrix.data-separator }}." \
            --add-data "requirements.txt${{ matrix.data-separator }}." \
            --add-data "LICENSE${{ matrix.data-separator }}." \
            --add-data "vars.properties${{ matrix.data-separator }}." \
            --add-data "user.vars.properties.example${{ matrix.data-separator }}." \
            start.py
        shell: bash

      - name: Rename Windows executable
        if: matrix.name == 'windows'
        run: |
          if [ -f dist/auto-bluray-tui/auto-bluray-tui.exe ]; then
            mv dist/auto-bluray-tui/auto-bluray-tui.exe dist/auto-bluray-tui/${{ matrix.executable }}
          fi
        shell: bash

      - name: Smoke test built executable help and doctor
        run: |
          set -euo pipefail
          app="dist/auto-bluray-tui/${{ matrix.executable }}"
          "$app" --help > smoke-help.txt
          "$app" --doctor | tee smoke-doctor.txt
          grep -F "Auto Blu-ray TUI doctor" smoke-doctor.txt
          grep -F "Bundled helper python:" smoke-doctor.txt
          grep -F "requests importable: yes" smoke-doctor.txt
          grep -F "tsMuxer" smoke-doctor.txt
        shell: bash

      - name: Smoke test packaged helper runtime
        run: |
          set -euo pipefail
          app="dist/auto-bluray-tui/${{ matrix.executable }}"
          helper_root="dist/auto-bluray-tui/_internal"
          project_dir="${RUNNER_TEMP}/auto-bluray-smoke-project"
          rm -rf "$project_dir"
          mkdir -p "$project_dir"
          : > "$project_dir/Example.mp4"
          AUTO_BLURAY_PYTHON="$app" bash "$helper_root/scripts/fetch-opensubtitles.sh" "$project_dir" > helper-opensubtitles.json
          grep -F '"status": "skipped"' helper-opensubtitles.json
          if grep -F "ModuleNotFoundError" helper-opensubtitles.json >/dev/null; then
            echo "Packaged helper runtime fell back to a Python environment missing bundled modules" >&2
            exit 1
          fi
        shell: bash

      - name: Stage release archive
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil
          import zipfile

          archive_name = "${{ matrix.archive }}"
          executable = "${{ matrix.executable }}"
          dist_dir = Path("dist") / "auto-bluray-tui"
          stage = Path("release-stage") / "auto-bluray-tui-${{ matrix.name }}"

          if stage.exists():
              shutil.rmtree(stage)
          stage.mkdir(parents=True)

          if not dist_dir.exists():
              raise SystemExit(f"Missing PyInstaller output: {dist_dir}")

          # Keep the whole onedir bundle so PyInstaller's runtime files and all
          # workflow support assets stay beside the executable under app/.
          shutil.copytree(dist_dir, stage / "app")

          # Also keep the top-level installer/readme/license files easy to find.
          for filename in ("install.py", "README_RELEASE.md", "README.md", "requirements.txt", "LICENSE"):
              source = Path(filename)
              if not source.exists():
                  raise SystemExit(f"Missing required release file: {filename}")
              shutil.copy2(source, stage / filename)

          required = [
              stage / "app" / executable,
              stage / "app" / "_internal" / "tools" / "bluray_tui_monitor.py",
              stage / "app" / "_internal" / "scripts" / "create-final-bluray-iso.sh",
              stage / "app" / "_internal" / "xlets" / "hdcookbook_discimage" / "build.xml",
              stage / "app" / "_internal" / "bin" / "grincompiler.jar",
              stage / "app" / "_internal" / "DiscCreationTools" / "index" / "index.xsd",
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit("Missing expected runtime asset(s):\n" + "\n".join(missing))

          archive_path = Path(archive_name)
          if archive_path.exists():
              archive_path.unlink()
          with zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(stage.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(stage.parent))
          print(f"Created {archive_path}")
          PY
        shell: bash

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

      - name: Upload archive to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
